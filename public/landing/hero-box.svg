<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="h">
  <title id="h">Illustration of 3D packaging box with lighting</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141820"/><stop offset="1" stop-color="#0a0c10"/>
